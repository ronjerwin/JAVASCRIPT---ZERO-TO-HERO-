<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>STOP WATCH PROJECT</title>
</head>
<body>
  <h1>Stopwatch</h1>
  <div>
    <p id="timeCounter">00:00:00:00</p>
    <button class="button start" onclick="handleStart()">Start</button>
    <button class="button stop" onclick="handleStop()">Stop</button>
    <button class="button reset" onclick="handleReset()">Reset</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
